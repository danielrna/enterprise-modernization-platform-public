<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enterprise Modernization Platform</title>
  <style>
    :root { --ink:#17202a; --muted:#64748b; --line:#d8dee8; --bg:#f7f9fb; --panel:#fff; --accent:#1769aa; }
    * { box-sizing:border-box; }
    body { margin:0; font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:var(--bg); }
    main { max-width:960px; margin:0 auto; padding:36px 24px; }
    h1 { margin:0 0 8px; font-size:34px; letter-spacing:0; }
    p { max-width:760px; color:var(--muted); }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    .layout { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:14px; margin:24px 0; }
    .tile { display:flex; flex-direction:column; gap:6px; min-height:118px; padding:18px; background:var(--panel); border:1px solid var(--line); border-radius:8px; color:var(--ink); }
    .tile span { color:var(--muted); }
    @media (max-width: 720px) { .layout { grid-template-columns:1fr; } h1 { font-size:27px; } }
  </style>
</head>
<body>
  <main>
    <h1>Enterprise Modernization Platform</h1>
    <p>Static readiness evidence for mandatory enterprise software modernization.</p>
    <section class="layout">
      <a class="tile" href="migration-hub/spring-boot-2-to-3.html"><strong>Spring Boot 2 to 3</strong><span>Guide, Docker command, GitHub Action, risk matrix, and benchmark evidence.</span></a>
      <a class="tile" href="benchmarks/index.html"><strong>Benchmark Reports</strong><span>Public readiness reports generated from open source Java projects.</span></a>
    </section>
  </main>
</body>
</html>
